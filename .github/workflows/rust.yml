name: fcore build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Test Lib
        run: cargo test --lib

  build-node:
    needs: [tests]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler musl-tools
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build Node (static)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo zigbuild --release \
            --bin node \
            --target ${{ matrix.target }} \
            --features xray,wireguard

      - name: Verify static binary
        run: |
          ldd target/${{ matrix.target }}/release/node || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcore-node-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/node

  build-api:
    needs: [tests]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build API (static)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo build --release \
            --bin api \
            --no-default-features \
            --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          ldd target/x86_64-unknown-linux-musl/release/api || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcore-api
          path: target/x86_64-unknown-linux-musl/release/api

  build-auth:
    needs: [tests]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build Auth (static)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cargo build --release \
            --bin auth \
            --no-default-features \
            --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          ldd target/x86_64-unknown-linux-musl/release/auth || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcore-auth
          path: target/x86_64-unknown-linux-musl/release/auth

  collect-binaries:
    runs-on: ubuntu-latest
    needs: [build-node, build-api, build-auth]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected
          pattern: fcore-*
          merge-multiple: false

      - name: Upload combined bundle
        uses: actions/upload-artifact@v4
        with:
          name: fcore-full-bundle
          path: collected/
